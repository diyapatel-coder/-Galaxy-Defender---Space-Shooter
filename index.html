<html>
<head>
  <title>Galaxy Defender - Space Shooter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="panel">
      <h2>🚀 Galaxy Defender</h2>
      <p>Move: ⬅️ ➡️<br>Shoot: Spacebar</p>
      <div>Score</div>
      <div id="score" class="score">0</div>
      <div>Lives</div>
      <div id="lives" class="score">3</div>
      <button onclick="restartGame()">Restart</button>
    </div>

    <div id="game">
      <div id="ship" class="ship">🚀</div>
      <div id="bossWarning">⚠️ BOSS INCOMING ⚠️</div>
      <div id="over">
        <h2>💥 Game Over</h2>
        <button onclick="restartGame()">Play Again</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
